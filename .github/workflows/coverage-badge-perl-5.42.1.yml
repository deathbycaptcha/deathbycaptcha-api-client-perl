name: Coverage Badge (Perl 5.42.1)

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Perl 5.42.1
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: "5.42"

      - name: Ensure cpanm
        run: |
          if ! command -v cpanm >/dev/null 2>&1; then
            cpan App::cpanminus
          fi

      - name: Install dependencies
        run: |
          cpanm --notest --installdeps .
          cpanm --notest Devel::Cover

      - name: Run unit tests with coverage
        run: |
          rm -rf cover_db
          HARNESS_PERL_SWITCHES=-MDevel::Cover prove -l t/0[0-4]-*.t
          cover -summary | tee coverage-summary.txt
          TOTAL_COVERAGE=$(awk '$1=="Total"{cov=$NF} END{print cov}' coverage-summary.txt)
          if ! echo "$TOTAL_COVERAGE" | grep -Eq '^[0-9]+(\.[0-9]+)?$'; then
            echo "Unable to parse coverage value from coverage-summary.txt"
            cat coverage-summary.txt
            exit 1
          fi
          echo "Coverage total: ${TOTAL_COVERAGE}%"
          echo "TOTAL_COVERAGE=${TOTAL_COVERAGE}" >> "$GITHUB_ENV"

      - name: Build badge SVG
        run: |
          mkdir -p .badge-pages/badges
          COVERAGE_VALUE="${TOTAL_COVERAGE}%"

          INT_PART="${TOTAL_COVERAGE%%.*}"
          COLOR="#e05d44"
          if [ "$INT_PART" -ge 90 ]; then
            COLOR="#4c1"
          elif [ "$INT_PART" -ge 80 ]; then
            COLOR="#97CA00"
          elif [ "$INT_PART" -ge 70 ]; then
            COLOR="#dfb317"
          fi

          cat > .badge-pages/badges/coverage.svg <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="120" height="20" role="img" aria-label="coverage: ${COVERAGE_VALUE}">
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <clipPath id="r">
              <rect width="120" height="20" rx="3" fill="#fff"/>
            </clipPath>
            <g clip-path="url(#r)">
              <rect width="63" height="20" fill="#555"/>
              <rect x="63" width="57" height="20" fill="${COLOR}"/>
              <rect width="120" height="20" fill="url(#s)"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">
              <text x="32.5" y="15" fill="#010101" fill-opacity=".3">coverage</text>
              <text x="32.5" y="14">coverage</text>
              <text x="90.5" y="15" fill="#010101" fill-opacity=".3">${COVERAGE_VALUE}</text>
              <text x="90.5" y="14">${COVERAGE_VALUE}</text>
            </g>
          </svg>
          EOF

          # Ensure GitHub Pages serves files as-is.
          touch .badge-pages/.nojekyll

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-perl-5.42.1
          path: |
            coverage-summary.txt
            cover_db/
            .badge-pages/badges/coverage.svg

      - name: Publish badge to gh-pages branch
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .badge-pages
          keep_files: true
